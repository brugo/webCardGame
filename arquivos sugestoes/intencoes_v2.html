<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intenções v2 — Web Card Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #161210;
    color: #f0ebe3;
    min-height: 100vh;
    padding: 2.5rem 2rem;
  }

  .header {
    max-width: 980px;
    margin: 0 auto 2.5rem;
    text-align: center;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: #C9922A;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .header h1 {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 2rem;
    font-weight: 700;
    color: #F5E6C4;
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header-sub {
    font-size: 13px;
    color: #8a7f72;
    margin-bottom: 2rem;
  }

  .legend {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1rem 1.75rem;
    padding: 0.875rem 1.25rem;
    background: #1E1A16;
    border-radius: 10px;
    border: 1px solid #2E2720;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #9a8f82;
  }

  .legend-pip {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
    gap: 1.125rem;
    max-width: 980px;
    margin: 0 auto;
  }

  .card {
    background: #FAF5EC;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    color: #1a1410;
  }

  .card-header {
    background: #1E1A16;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #C9922A;
  }

  .card-number {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #6B5C40;
  }

  .card-name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 14px;
    font-weight: 700;
    color: #F5E6C4;
    line-height: 1.25;
    flex: 1;
    padding: 0 10px;
  }

  .card-badge {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #C9922A;
    text-transform: uppercase;
    background: rgba(201,146,42,0.12);
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid rgba(201,146,42,0.25);
    white-space: nowrap;
  }

  .card-body {
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  .section {
    padding: 10px 14px;
    font-size: 12.5px;
    line-height: 1.5;
    color: inherit;
    border-bottom: 1px solid rgba(0,0,0,0.07);
  }

  .section:last-child {
    border-bottom: none;
  }

  .section-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0.55;
  }

  .presagio {
    background: #FFFAEE;
    border-left: 3px solid #D97706;
    color: #5C3808;
  }
  .presagio .section-label { color: #92600A; }

  .comum {
    background: #EFF6FF;
    border-left: 3px solid #2563EB;
    color: #1E3A6E;
  }
  .comum .section-label { color: #1D4ED8; }

  .brutal {
    background: #FEF2F2;
    border-left: 3px solid #DC2626;
    color: #7F1D1D;
  }
  .brutal .section-label { color: #B91C1C; }

  .represalia {
    background: #F5F3FF;
    border-left: 3px solid #7C3AED;
    color: #3B0764;
  }
  .represalia .section-label { color: #6D28D9; }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,146,42,0.3), transparent);
    margin: 0;
  }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 11px;
    color: #3d352c;
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    body { padding: 1.25rem 1rem; }
    .header h1 { font-size: 1.5rem; }
    .grid { grid-template-columns: 1fr; }
  }

  @media print {
    body { background: #fff; padding: 0.5cm; color: #111; }
    .header h1 { color: #111; }
    .card-header { background: #222; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
    .card { box-shadow: 0 0 0 1px #ccc; page-break-inside: avoid; }
    footer { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Web Card Game</div>
  <h1>Cartas de Intenção v2</h1>
  <p class="header-sub">15 cartas no novo formato · Presságio · Alvos · Represália</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-pip" style="background:#D97706"></div>Presságio — início da rodada</div>
    <div class="legend-item"><div class="legend-pip" style="background:#2563EB"></div>Comuns — alvo dos inimigos comuns</div>
    <div class="legend-item"><div class="legend-pip" style="background:#DC2626"></div>Brutal — alvo do inimigo brutal</div>
    <div class="legend-item"><div class="legend-pip" style="background:#7C3AED"></div>Represália — consequência no fim da rodada</div>
  </div>
</div>

<div class="grid" id="cards"></div>

<footer>Web Card Game · Baralho de Intenções v2 · 15 cartas</footer>

<script>
const cards = [
  {
    num: '001',
    name: 'Caçada ao Sangue',
    presagio: 'Revele a próxima carta do baralho de Armadilhas (sem ativá-la). O grupo vê o que está por vir.',
    comum: 'Herói com menos Vida atual.',
    brutal: 'Herói com menos Vida atual.',
    represalia: 'Se algum herói foi derrotado esta rodada, invoque 1 Inimigo Comum imediatamente.'
  },
  {
    num: '002',
    name: 'Pressão Crescente',
    presagio: 'O Inimigo Brutal recebe +2 de Vida máxima e atual imediatamente.',
    comum: 'Herói com mais Vida atual.',
    brutal: 'Herói com menos Escudo atual.',
    represalia: 'Se o Brutal ainda estiver vivo ao fim da rodada, ele ganha Enfurecido permanentemente.'
  },
  {
    num: '003',
    name: 'Fúria Coordenada',
    presagio: 'Todos os inimigos em jogo ganham +1 de dano nesta rodada.',
    comum: 'Herói com mais cartas na mão.',
    brutal: 'Herói que causou mais dano nesta rodada.',
    represalia: 'Se nenhum inimigo foi derrotado nesta rodada, todos os heróis descartam 1 carta aleatoriamente.'
  },
  {
    num: '004',
    name: 'Instinto Predatório',
    presagio: 'Cada herói com 0 de Escudo sofre 1 de dano imediatamente.',
    comum: 'Herói com menos Escudo atual.',
    brutal: 'Herói com menos Vida atual.',
    represalia: 'Se nenhum herói possui Escudo ao fim da rodada, todos sofrem 1 de dano adicional.'
  },
  {
    num: '005',
    name: 'Coração Fraco',
    presagio: 'O herói com menos Vida perde 1 de Energia nesta rodada (mínimo 1).',
    comum: 'Herói com menos Vida atual.',
    brutal: 'Herói com menos Vida atual.',
    represalia: 'Se o herói com menos Vida terminar a rodada abaixo de 5 pontos, ele sofre 2 de dano adicional.'
  },
  {
    num: '006',
    name: 'Cerco Implacável',
    presagio: 'Cada Inimigo Comum em jogo ganha +1 de Escudo imediatamente.',
    comum: 'Herói com menos Vida atual.',
    brutal: 'Herói com mais Escudo atual.',
    represalia: 'Se restarem 2 ou mais inimigos vivos ao fim da rodada, todos os heróis sofrem 1 de dano.'
  },
  {
    num: '007',
    name: 'Retaliação',
    presagio: 'O Inimigo Brutal não pode ser alvo de Reações nesta rodada.',
    comum: 'Herói que causou mais dano nesta rodada.',
    brutal: 'Herói que derrotou mais inimigos nesta rodada.',
    represalia: 'Se o Brutal sobreviveu a esta rodada, ele ganha +1 de dano permanentemente.'
  },
  {
    num: '008',
    name: 'Golpe nos Fortes',
    presagio: 'O herói com mais Escudo atual perde metade do seu Escudo (arredondado para baixo).',
    comum: 'Herói com mais Vida atual.',
    brutal: 'Herói com mais Vida atual.',
    represalia: 'Se o herói com mais Vida não recebeu nenhum Escudo nesta rodada, ele sofre 2 de dano adicional.'
  },
  {
    num: '009',
    name: 'Pavor das Sombras',
    presagio: 'Na próxima fase de compra desta sala, cada herói comprará 1 carta a menos (mínimo 1).',
    comum: 'Herói com menos cartas na mão.',
    brutal: 'Herói com menos Energia atual.',
    represalia: 'Se algum herói terminar a rodada com 0 cartas na mão, ele sofre 2 de dano.'
  },
  {
    num: '010',
    name: 'Oportunismo',
    presagio: 'Se houver uma Armadilha ativa, ela aplica seu efeito uma vez adicional agora.',
    comum: 'Herói com menos Escudo atual.',
    brutal: 'Herói com menos Vida atual.',
    represalia: 'Se a Armadilha ainda estiver ativa ao fim da rodada, todos os heróis sofrem 1 de dano.'
  },
  {
    num: '011',
    name: 'Avanço Pesado',
    presagio: 'Todos os Inimigos Comuns em jogo ganham +2 de Vida máxima e atual.',
    comum: 'Herói com mais Escudo atual.',
    brutal: 'Herói com mais Vida atual.',
    represalia: 'Se restarem 2 ou mais Comuns vivos ao fim da rodada, o Brutal realiza 1 ataque adicional de 2 de dano fixo no herói com menos Vida.'
  },
  {
    num: '012',
    name: 'Caçada ao Preparado',
    presagio: 'O herói com mais cartas na mão deve descartar 1 carta agora (à sua escolha).',
    comum: 'Herói com mais cartas na mão.',
    brutal: 'Herói com mais Energia no início desta rodada.',
    represalia: 'Se algum herói gastou menos de 2 de Energia nesta rodada, ele sofre 1 de dano.'
  },
  {
    num: '013',
    name: 'Execução Coordenada',
    presagio: 'Todos os Inimigos Comuns ganham Veloz nesta rodada (atacam antes do Brutal).',
    comum: 'Herói com menos Escudo atual.',
    brutal: 'Herói que sofreu mais dano nesta rodada.',
    represalia: 'Se o herói com menos Escudo terminar a rodada com menos de 8 de Vida, ele sofre 2 de dano adicional.'
  },
  {
    num: '014',
    name: 'Ruptura do Ritmo',
    presagio: 'O herói com mais Escudo transfere metade do seu Escudo (arredondado para baixo) para o herói com menos Vida.',
    comum: 'Herói que jogou mais cartas nesta rodada.',
    brutal: 'Herói que jogou menos cartas nesta rodada.',
    represalia: 'Se algum herói não jogou nenhuma carta de Ataque nesta rodada, ele sofre 2 de dano.'
  },
  {
    num: '015',
    name: 'Sangue e Cura',
    presagio: 'O herói com mais Vida atual perde 2 pontos de Vida (ignora Escudo, não pode matar).',
    comum: 'Herói que recebeu mais cura nesta rodada.',
    brutal: 'Herói com menos Vida atual.',
    represalia: 'Se algum herói foi curado nesta rodada, ele sofre 1 de dano adicional.'
  }
];

const grid = document.getElementById('cards');
cards.forEach(c => {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-header">
      <span class="card-number">INT-${c.num}</span>
      <span class="card-name">${c.name}</span>
      <span class="card-badge">Intenção</span>
    </div>
    <div class="card-body">
      <div class="section presagio">
        <div class="section-label">⚡ Presságio</div>
        ${c.presagio}
      </div>
      <div class="section comum">
        <div class="section-label">👤 Comuns atacam</div>
        ${c.comum}
      </div>
      <div class="section brutal">
        <div class="section-label">👹 Brutal ataca</div>
        ${c.brutal}
      </div>
      <div class="section represalia">
        <div class="section-label">💀 Represália</div>
        ${c.represalia}
      </div>
    </div>
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
